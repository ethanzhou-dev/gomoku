<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典五子棋</title>
    <!-- 引入开源免费的霞鹜文楷字体，以保证手机端也能显示优美的楷体 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <div class="header">
            <h1>经典五子棋</h1>
            <div class="status" id="status">黑子先手</div>
        </div>

        <div class="board-container">
            <canvas id="chessBoard" width="450" height="450"></canvas>
        </div>

        <div class="controls">
            <button id="btn-restart" class="skeuo-btn">重新开始</button>
            <button id="btn-undo" class="skeuo-btn">悔棋</button>
            <button id="btn-hint" class="skeuo-btn" title="获取最佳落子位置">提示</button>
            
            <div class="mode-selector">
                <label class="skeuo-radio">
                    <input type="checkbox" id="chk-forbidden">
                    <span style="color: #a7281c;">开启禁手(仅黑棋)</span>
                </label>
            </div>
            
            <div class="mode-selector">
                <label class="skeuo-radio">
                    <input type="radio" name="mode" value="pvp" checked>
                    <span>双人对战</span>
                </label>
                <label class="skeuo-radio">
                    <input type="radio" name="mode" value="pve">
                    <span>人机对战</span>
                </label>
            </div>

            <div class="difficulty-selector" id="diff-selector" style="display: none;">
                <label class="skeuo-radio">
                    <input type="radio" name="difficulty" value="2">
                    <span>简单</span>
                </label>
                <label class="skeuo-radio">
                    <input type="radio" name="difficulty" value="4" checked>
                    <span>普通</span>
                </label>
                <label class="skeuo-radio">
                    <input type="radio" name="difficulty" value="6">
                    <span>困难</span>
                </label>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>
